networks:
  mcp-gw-net:
    driver: bridge
    name: mcp-gw-net

services:
  mcp-gateway:
    build: .
    container_name: mcp-gateway
    networks:
      - mcp-gw-net
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/config/backends.json
      - RAG_DATA_DIR=/app/data
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
